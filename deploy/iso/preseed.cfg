# Home Router — Debian 12 Bookworm Preseed Configuration
# Semi-attended via cdebconf: hostname, root password, admin password,
# and disk are asked through the installer's own UI (not whiptail).
# Web admin password uses a custom debconf template registered in
# early_command. NAS storage disks configured via web UI after install.

# Locale and keyboard are asked natively before the CD preseed file is loaded.
# Boot parameters use locale?= and keymap?= to provide English/US locale and
# Turkish Q keyboard defaults while keeping the full d-i language list and
# keyboard selector visible.
#
# Timezone is asked with a custom debconf question in early_command. The d-i
# time/zone template is not reliably available when the CD preseed loads.
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true

# Network — skip entirely (router configures its own networking post-install)
d-i netcfg/enable boolean false
d-i netcfg/choose_interface select auto
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_hostname string hermes
d-i netcfg/get_domain string lan
d-i netcfg/dhcp_failed note
d-i netcfg/dhcp_options select Do not configure the network at this time
d-i netcfg/wireless_wep string
d-i hw-detect/load_firmware boolean false

# Mirror — use ISO as local repo (offline install)
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i apt-setup/use_mirror boolean false
d-i apt-setup/no_mirror boolean true
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-failed boolean false

# User setup — root login enabled, root password asked natively by d-i.
# Service user homerouter is created with locked password (login via web UI).
d-i passwd/root-login boolean true
d-i passwd/make-user boolean true
d-i passwd/user-fullname string Home Router Admin
d-i passwd/username string homerouter
d-i passwd/user-password-crypted password !

# Early command — register a custom debconf template for the web admin
# password and ask via cdebconf (the installer's own UI). This avoids
# whiptail/tty conflicts entirely. Templates are loaded into cdebconf's
# database so the question appears in the same UI as the rest of d-i.
d-i preseed/early_command string \
    printf 'Template: home-router/title-timezone\nType: title\nDescription: Configure time zone / Saat dilimini yapılandır\n\nTemplate: home-router/title-hostname\nType: title\nDescription: Configure router hostname / Router adını yapılandır\n\nTemplate: home-router/title-admin-password\nType: title\nDescription: Configure web admin password / Web yönetici şifresini yapılandır\n\nTemplate: home-router/timezone\nType: string\nDefault: Europe/Istanbul\nDescription: Time zone / Saat dilimi\n Enter the IANA time zone for this router.\n .\n Bu router için IANA saat dilimini girin.\n\nTemplate: home-router/timezone-invalid\nType: error\nDescription: Invalid time zone / Geçersiz saat dilimi\n The time zone you entered does not exist. Use an IANA name such as Europe/Istanbul.\n .\n Girilen saat dilimi bulunamadı. Europe/Istanbul gibi bir IANA adı kullanın.\n\nTemplate: home-router/hostname\nType: string\nDefault: hermes\nDescription: Router hostname / Ana bilgisayar adı\n Enter a hostname for this router.\n .\n Bu router için bir ana bilgisayar adı girin.\n\nTemplate: home-router/hostname-invalid\nType: error\nDescription: Invalid hostname / Geçersiz ana bilgisayar adı\n Use 2-63 lowercase letters, numbers, or hyphens. The name may not start or end with a hyphen.\n .\n 2-63 küçük harf, rakam veya tire kullanın. Ad tire ile başlayamaz veya bitemez.\n\nTemplate: home-router/admin-password\nType: password\nDescription: Home Router web admin password / Web yönetici şifresi\n Enter the password for the home-router web administration interface (min 8 chars).\n .\n Web yönetim arayüzü için şifre girin (en az 8 karakter).\n\nTemplate: home-router/admin-password-confirm\nType: password\nDescription: Confirm web admin password / Şifreyi tekrar girin\n Re-enter the password to confirm.\n .\n Doğrulama için şifreyi tekrar girin.\n\nTemplate: home-router/admin-password-mismatch\nType: error\nDescription: Passwords do not match / Şifreler eşleşmiyor\n The two passwords you entered were different. Please try again.\n .\n Girilen iki şifre farklı. Lütfen tekrar deneyin.\n\nTemplate: home-router/admin-password-too-short\nType: error\nDescription: Password too short / Şifre çok kısa\n The password must be at least 8 characters.\n .\n Şifre en az 8 karakter olmalıdır.\n' > /tmp/hr.tmpl ; \
    debconf-loadtemplate home-router /tmp/hr.tmpl ; \
    . /usr/share/debconf/confmodule ; \
    db_settitle home-router/title-timezone ; \
    while : ; do \
        db_fset home-router/timezone seen false ; \
        db_input critical home-router/timezone ; \
        db_go ; \
        db_get home-router/timezone ; \
        TZ_VAL="${RET:-Europe/Istanbul}" ; \
        if [ -r /cdrom/timezones.txt ] && grep -Fxq "$TZ_VAL" /cdrom/timezones.txt ; then \
            break ; \
        fi ; \
        if [ ! -r /cdrom/timezones.txt ] && [ -f "/usr/share/zoneinfo/$TZ_VAL" ] ; then \
            break ; \
        fi ; \
        db_input critical home-router/timezone-invalid ; \
        db_go ; \
    done ; \
    db_set time/zone "$TZ_VAL" ; \
    db_fset time/zone seen true ; \
    printf '%s' "$TZ_VAL" > /tmp/timezone.txt ; \
    db_settitle home-router/title-hostname ; \
    while : ; do \
        db_fset home-router/hostname seen false ; \
        db_input critical home-router/hostname ; \
        db_go ; \
        db_get home-router/hostname ; \
        HOSTNAME_VAL="${RET:-hermes}" ; \
        HOSTNAME_OK=false ; \
        if [ ${#HOSTNAME_VAL} -ge 2 ] && [ ${#HOSTNAME_VAL} -le 63 ] ; then \
            case "$HOSTNAME_VAL" in \
                -*|*-|*[!abcdefghijklmnopqrstuvwxyz0123456789-]*) HOSTNAME_OK=false ;; \
                *) HOSTNAME_OK=true ;; \
            esac ; \
        fi ; \
        if [ "$HOSTNAME_OK" = true ] ; then \
            break ; \
        fi ; \
        db_input critical home-router/hostname-invalid ; \
        db_go ; \
    done ; \
    debconf-set netcfg/get_hostname "$HOSTNAME_VAL" ; \
    printf '%s' "$HOSTNAME_VAL" > /tmp/hostname.txt ; \
    db_settitle home-router/title-admin-password ; \
    while : ; do \
        db_fset home-router/admin-password seen false ; \
        db_fset home-router/admin-password-confirm seen false ; \
        db_input critical home-router/admin-password ; \
        db_go ; \
        db_get home-router/admin-password ; \
        PASS1="$RET" ; \
        if [ "${#PASS1}" -lt 8 ] ; then \
            db_input critical home-router/admin-password-too-short ; \
            db_go ; \
            continue ; \
        fi ; \
        db_input critical home-router/admin-password-confirm ; \
        db_go ; \
        db_get home-router/admin-password-confirm ; \
        PASS2="$RET" ; \
        if [ "$PASS1" = "$PASS2" ] ; then \
            break ; \
        fi ; \
        db_input critical home-router/admin-password-mismatch ; \
        db_go ; \
    done ; \
    printf '%s' "$PASS1" > /tmp/admin-password.txt

# Disk partitioning — regular, atomic. With one disk partman auto-selects;
# with multiple disks partman asks the user via cdebconf (its own UI).
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# GRUB
d-i grub-installer/only_debian boolean true

# Package selection — skip d-i package installation. Router packages are
# installed offline in late_command from the ISO's flat local repository.
d-i pkgsel/run_tasksel boolean false
d-i pkgsel/include string
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

# Late command — copy all assets into the target system, then run
# post-install.sh inside the chroot. Configs, sysconf templates, systemd
# units, and the DHCP-DNS update script are all required for a working
# install. The bash invocation (with `set -e`) aborts on missing critical
# assets so d-i surfaces an error instead of rebooting into a broken target.
d-i preseed/late_command string \
    bash -c 'set -e; \
        cp /cdrom/post-install.sh /target/tmp/post-install.sh; \
        cp /cdrom/home-router /target/tmp/home-router; \
        mkdir -p /target/tmp/pool-extra; \
        cp -r /cdrom/pool/extra/. /target/tmp/pool-extra/; \
        cp -r /cdrom/configs /target/tmp/ 2>/dev/null || true; \
        cp -r /cdrom/systemd /target/tmp/ 2>/dev/null || true; \
        cp /cdrom/dhcp-dns-update.sh /target/tmp/ 2>/dev/null || true; \
        cp /tmp/admin-password.txt /target/tmp/ 2>/dev/null || true; \
        cp /tmp/hostname.txt /target/tmp/ 2>/dev/null || true; \
        cp /tmp/timezone.txt /target/tmp/ 2>/dev/null || true; \
        if [ ! -s /target/tmp/post-install.sh ]; then \
            echo "ERROR: post-install.sh missing or empty in target" >&2; exit 1; \
        fi; \
        if [ ! -s /target/tmp/home-router ]; then \
            echo "ERROR: home-router binary missing or empty in target" >&2; exit 1; \
        fi; \
        in-target bash /tmp/post-install.sh'

# Finish
d-i finish-install/reboot_in_progress note
