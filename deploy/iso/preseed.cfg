# Home Router — Debian 12 Bookworm Preseed Configuration
# Semi-attended: installer asks language/keyboard, early_command asks
# hostname, root password, admin password, and disk selection via whiptail.
# NAS storage disks configured via web UI after install.

# Locale/keyboard defaults (asked by installer before preseed loads)
d-i debian-installer/locale string tr_TR.UTF-8
d-i keyboard-configuration/xkb-keymap select tr
d-i time/zone string Europe/Istanbul
d-i clock-setup/utc boolean true
d-i clock-setup/ntp boolean true

# Network — skip entirely (router configures its own networking post-install)
d-i netcfg/enable boolean false
d-i netcfg/choose_interface select auto
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_hostname string hermes
d-i netcfg/get_domain string lan
d-i netcfg/dhcp_failed note
d-i netcfg/dhcp_options select Do not configure the network at this time
d-i netcfg/wireless_wep string
d-i hw-detect/load_firmware boolean false

# Mirror — use ISO as local repo (offline install)
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i apt-setup/use_mirror boolean false
d-i apt-setup/cdrom/set-first boolean true
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-failed boolean false

# User setup — root enabled, service user created
d-i passwd/root-login boolean true
d-i passwd/user-fullname string Home Router Admin
d-i passwd/username string homerouter
d-i passwd/user-password-crypted string !

# Early command — interactive setup (whiptail prompts)
d-i preseed/early_command string \
    HOSTNAME=$(whiptail --title "Home Router — Hostname" \
        --inputbox "Enter hostname for the router:" \
        10 50 "hermes" 3>&1 1>&2 2>&3) || HOSTNAME="hermes"; \
    debconf-set netcfg/get_hostname "$HOSTNAME"; \
    ROOT_PASS=$(whiptail --title "Home Router — Root Password" \
        --passwordbox "Enter root (SSH/console) password (min 8 chars):" \
        10 50 3>&1 1>&2 2>&3); \
    while [ ${#ROOT_PASS} -lt 8 ]; do \
        ROOT_PASS=$(whiptail --title "Home Router — Root Password" \
            --passwordbox "Password too short! Enter root password (min 8 chars):" \
            10 50 3>&1 1>&2 2>&3); \
    done; \
    HASH=$(echo "$ROOT_PASS" | openssl passwd -6 -stdin); \
    debconf-set passwd/root-password-crypted "$HASH"; \
    ADMIN_PASS=$(whiptail --title "Home Router — Web UI Password" \
        --passwordbox "Enter web UI admin password (min 8 chars):" \
        10 50 3>&1 1>&2 2>&3); \
    while [ ${#ADMIN_PASS} -lt 8 ]; do \
        ADMIN_PASS=$(whiptail --title "Home Router — Web UI Password" \
            --passwordbox "Password too short! Enter web UI admin password (min 8 chars):" \
            10 50 3>&1 1>&2 2>&3); \
    done; \
    echo "$ADMIN_PASS" > /tmp/admin-password.txt; \
    DISKS=$(lsblk -d -n -o NAME,SIZE,MODEL -e 7,11 | awk '{print "/dev/"$1, $2" "$3}'); \
    COUNT=$(echo "$DISKS" | wc -l); \
    if [ "$COUNT" -eq 1 ]; then \
        SELECTED=$(echo "$DISKS" | awk '{print $1}'); \
    else \
        MENU=""; \
        while IFS= read -r line; do \
            DEV=$(echo "$line" | awk '{print $1}'); \
            DESC=$(echo "$line" | cut -d' ' -f2-); \
            MENU="$MENU $DEV \"$DESC\" off"; \
        done <<< "$DISKS"; \
        SELECTED=$(eval whiptail --title '"Home Router — Disk Selection"' \
            --radiolist '"Select the disk for OS installation.\nRemaining disks can be configured for NAS via web UI."' \
            15 60 "$COUNT" $MENU 3>&1 1>&2 2>&3); \
    fi; \
    debconf-set partman-auto/disk "$SELECTED"; \
    debconf-set grub-installer/bootdev "$SELECTED"

# Disk partitioning — single selected disk, automatic layout
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# GRUB
d-i grub-installer/only_debian boolean true

# Package selection — minimal
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string \
    ppp pppoe nftables wireguard-tools openvpn easy-rsa \
    samba samba-common-bin smartmontools mdadm iproute2 \
    unbound dnsmasq rsyslog chrony qrencode \
    wide-dhcpv6-client curl jq hdparm
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

# Late command — run post-install script
d-i preseed/late_command string \
    cp /cdrom/post-install.sh /target/tmp/ ; \
    cp /cdrom/home-router /target/tmp/ ; \
    cp /tmp/admin-password.txt /target/tmp/ 2>/dev/null || true ; \
    in-target bash /tmp/post-install.sh

# Finish
d-i finish-install/reboot_in_progress note
