# LANKeeper — Debian 12 Bookworm Preseed Configuration
# Semi-attended via cdebconf: hostname, root password, admin password,
# and disk are asked through the installer's own UI (not whiptail).
# Web admin password uses a custom debconf template registered in
# early_command. NAS storage disks configured via web UI after install.

# Locale and keyboard are asked natively before the CD preseed file is loaded.
# Boot parameters use locale?= and keymap?= to provide English/US locale and
# Turkish Q keyboard defaults while keeping the full d-i language list and
# keyboard selector visible.
#
# Timezone is asked with a custom debconf question in early_command. Preseed
# d-i's native clock step with a static default so it does not ask a second,
# country-limited timezone question; post-install applies the custom answer.
d-i clock-setup/utc boolean true
d-i time/zone string Europe/Istanbul
d-i clock-setup/ntp boolean true

# Network — skip entirely (router configures its own networking post-install)
d-i netcfg/enable boolean false
d-i netcfg/choose_interface select auto
d-i netcfg/disable_autoconfig boolean true
d-i netcfg/get_hostname string hermes
d-i netcfg/get_domain string lan
d-i netcfg/dhcp_failed note
d-i netcfg/dhcp_options select Do not configure the network at this time
d-i netcfg/wireless_wep string
d-i hw-detect/load_firmware boolean false

# Mirror — use ISO as local repo (offline install)
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i apt-setup/use_mirror boolean false
d-i apt-setup/no_mirror boolean true
d-i apt-setup/cdrom/set-first boolean false
d-i apt-setup/cdrom/set-next boolean false
d-i apt-setup/cdrom/set-failed boolean false

# User setup — root login enabled, root password asked natively by d-i.
# Service user lankeeper is created with locked password (login via web UI).
d-i passwd/root-login boolean true
d-i passwd/make-user boolean true
d-i passwd/user-fullname string LANKeeper Admin
d-i passwd/username string lankeeper
d-i passwd/user-password-crypted password !

# Early command — register a custom debconf template for the web admin
# password and ask via cdebconf (the installer's own UI). This avoids
# whiptail/tty conflicts entirely. Templates are loaded into cdebconf's
# database so the question appears in the same UI as the rest of d-i.
d-i preseed/early_command string \
    printf 'Template: lankeeper/title-timezone\nType: title\nDescription: Configure time zone / Saat dilimini yapılandır\n\nTemplate: lankeeper/title-hostname\nType: title\nDescription: Configure router hostname / Router adını yapılandır\n\nTemplate: lankeeper/title-admin-password\nType: title\nDescription: Configure web admin password / Web yönetici şifresini yapılandır\n\nTemplate: lankeeper/timezone\nType: string\nDefault: Europe/Istanbul\nDescription: Time zone / Saat dilimi\n Enter the IANA time zone for this router.\n .\n Bu router için IANA saat dilimini girin.\n\nTemplate: lankeeper/timezone-invalid\nType: error\nDescription: Invalid time zone / Geçersiz saat dilimi\n The time zone you entered does not exist. Use an IANA name such as Europe/Istanbul.\n .\n Girilen saat dilimi bulunamadı. Europe/Istanbul gibi bir IANA adı kullanın.\n\nTemplate: lankeeper/hostname\nType: string\nDefault: hermes\nDescription: Router hostname / Ana bilgisayar adı\n Enter a hostname for this router.\n .\n Bu router için bir ana bilgisayar adı girin.\n\nTemplate: lankeeper/hostname-invalid\nType: error\nDescription: Invalid hostname / Geçersiz ana bilgisayar adı\n Use 2-63 lowercase letters, numbers, or hyphens. The name may not start or end with a hyphen.\n .\n 2-63 küçük harf, rakam veya tire kullanın. Ad tire ile başlayamaz veya bitemez.\n\nTemplate: lankeeper/admin-password\nType: password\nDescription: LANKeeper web admin password / Web yönetici şifresi\n Enter the password for the lankeeper web administration interface (min 8 chars).\n .\n Web yönetim arayüzü için şifre girin (en az 8 karakter).\n\nTemplate: lankeeper/admin-password-confirm\nType: password\nDescription: Confirm web admin password / Şifreyi tekrar girin\n Re-enter the password to confirm.\n .\n Doğrulama için şifreyi tekrar girin.\n\nTemplate: lankeeper/admin-password-mismatch\nType: error\nDescription: Passwords do not match / Şifreler eşleşmiyor\n The two passwords you entered were different. Please try again.\n .\n Girilen iki şifre farklı. Lütfen tekrar deneyin.\n\nTemplate: lankeeper/admin-password-too-short\nType: error\nDescription: Password too short / Şifre çok kısa\n The password must be at least 8 characters.\n .\n Şifre en az 8 karakter olmalıdır.\n\nTemplate: lankeeper/title-install-complete\nType: title\nDescription: Installation complete / Kurulum tamamlandı\n\nTemplate: lankeeper/install-complete\nType: note\nDescription: Installation complete / Kurulum tamamlandı\n LANKeeper was installed successfully.\n .\n Remove the installation ISO/USB from this machine, then select Continue to reboot into the installed system.\n .\n LANKeeper başarıyla kuruldu.\n .\n Kurulum ISO/USB medyasını çıkarın, ardından kurulu sisteme yeniden başlatmak için Continue seçin.\n' > /tmp/hr.tmpl ; \
    debconf-loadtemplate lankeeper /tmp/hr.tmpl ; \
    . /usr/share/debconf/confmodule ; \
    db_settitle lankeeper/title-timezone ; \
    while : ; do \
        db_fset lankeeper/timezone seen false ; \
        db_input critical lankeeper/timezone ; \
        db_go ; \
        db_get lankeeper/timezone ; \
        TZ_VAL="${RET:-Europe/Istanbul}" ; \
        if [ -r /cdrom/timezones.txt ] && grep -Fxq "$TZ_VAL" /cdrom/timezones.txt ; then \
            break ; \
        fi ; \
        if [ ! -r /cdrom/timezones.txt ] && [ -f "/usr/share/zoneinfo/$TZ_VAL" ] ; then \
            break ; \
        fi ; \
        db_input critical lankeeper/timezone-invalid ; \
        db_go ; \
    done ; \
    db_set time/zone "$TZ_VAL" ; \
    db_fset time/zone seen true ; \
    if command -v debconf-set-selections >/dev/null 2>&1 ; then \
        printf 'd-i time/zone string %s\n' "$TZ_VAL" | debconf-set-selections ; \
        printf 'd-i time/zone seen true\n' | debconf-set-selections ; \
    fi ; \
    printf '%s' "$TZ_VAL" > /tmp/timezone.txt ; \
    db_settitle lankeeper/title-hostname ; \
    while : ; do \
        db_fset lankeeper/hostname seen false ; \
        db_input critical lankeeper/hostname ; \
        db_go ; \
        db_get lankeeper/hostname ; \
        HOSTNAME_VAL="${RET:-hermes}" ; \
        HOSTNAME_OK=false ; \
        if [ ${#HOSTNAME_VAL} -ge 2 ] && [ ${#HOSTNAME_VAL} -le 63 ] ; then \
            case "$HOSTNAME_VAL" in \
                -*|*-|*[!abcdefghijklmnopqrstuvwxyz0123456789-]*) HOSTNAME_OK=false ;; \
                *) HOSTNAME_OK=true ;; \
            esac ; \
        fi ; \
        if [ "$HOSTNAME_OK" = true ] ; then \
            break ; \
        fi ; \
        db_input critical lankeeper/hostname-invalid ; \
        db_go ; \
    done ; \
    debconf-set netcfg/get_hostname "$HOSTNAME_VAL" ; \
    printf '%s' "$HOSTNAME_VAL" > /tmp/hostname.txt ; \
    db_settitle lankeeper/title-admin-password ; \
    while : ; do \
        db_fset lankeeper/admin-password seen false ; \
        db_fset lankeeper/admin-password-confirm seen false ; \
        db_input critical lankeeper/admin-password ; \
        db_go ; \
        db_get lankeeper/admin-password ; \
        PASS1="$RET" ; \
        if [ "${#PASS1}" -lt 8 ] ; then \
            db_input critical lankeeper/admin-password-too-short ; \
            db_go ; \
            continue ; \
        fi ; \
        db_input critical lankeeper/admin-password-confirm ; \
        db_go ; \
        db_get lankeeper/admin-password-confirm ; \
        PASS2="$RET" ; \
        if [ "$PASS1" = "$PASS2" ] ; then \
            break ; \
        fi ; \
        db_input critical lankeeper/admin-password-mismatch ; \
        db_go ; \
    done ; \
    printf '%s' "$PASS1" > /tmp/admin-password.txt ; \
    chmod 0600 /tmp/admin-password.txt ; \
    mkdir -p /usr/lib/finish-install.d ; \
    printf '#!/bin/sh\nset -e\n. /usr/share/debconf/confmodule\ndb_settitle lankeeper/title-install-complete\ndb_input critical lankeeper/install-complete || true\ndb_go || true\n' > /usr/lib/finish-install.d/98lankeeper-complete ; \
    chmod +x /usr/lib/finish-install.d/98lankeeper-complete

# Disk partitioning — regular, atomic. With one disk partman auto-selects;
# with multiple disks partman asks the user via cdebconf (its own UI).
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# GRUB
d-i grub-installer/only_debian boolean true

# Package selection — skip d-i package installation. Router packages are
# installed offline in late_command from the ISO's flat local repository.
d-i pkgsel/run_tasksel boolean false
d-i pkgsel/include string
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

# Late command — copy all assets into the target system, then run
# post-install.sh inside the chroot. Configs, sysconf templates, systemd
# units, and the DHCP-DNS update script are all required for a working
# install. The d-i environment only guarantees /bin/sh (busybox ash), so
# keep this wrapper POSIX-shell compatible.
d-i preseed/late_command string \
    sh -c 'set -e; \
        cp /cdrom/post-install.sh /target/tmp/post-install.sh; \
        cp /cdrom/lankeeper /target/tmp/lankeeper; \
        cp /cdrom/lankeeper.sha256 /target/tmp/lankeeper.sha256; \
        mkdir -p /target/tmp/pool-extra; \
        cp -r /cdrom/pool/extra/. /target/tmp/pool-extra/; \
        cp -r /cdrom/configs /target/tmp/ 2>/dev/null || true; \
        cp -r /cdrom/systemd /target/tmp/ 2>/dev/null || true; \
        cp /cdrom/dhcp-dns-update.sh /target/tmp/ 2>/dev/null || true; \
        install -m 0600 /tmp/admin-password.txt /target/tmp/admin-password.txt 2>/dev/null || true; \
        cp /tmp/hostname.txt /target/tmp/ 2>/dev/null || true; \
        cp /tmp/timezone.txt /target/tmp/ 2>/dev/null || true; \
        if [ ! -s /target/tmp/post-install.sh ]; then \
            echo "ERROR: post-install.sh missing or empty in target" >&2; exit 1; \
        fi; \
        if [ ! -s /target/tmp/lankeeper ]; then \
            echo "ERROR: lankeeper binary missing or empty in target" >&2; exit 1; \
        fi; \
        if [ ! -s /target/tmp/lankeeper.sha256 ]; then \
            echo "ERROR: lankeeper.sha256 manifest missing in target" >&2; exit 1; \
        fi; \
        if ! ( cd /target/tmp && sha256sum -c --status lankeeper.sha256 ); then \
            echo "ERROR: lankeeper binary failed SHA-256 integrity check; refusing to install a tampered ISO" >&2; \
            exit 1; \
        fi; \
        chmod +x /target/tmp/lankeeper /target/tmp/post-install.sh; \
        cp /target/etc/apt/sources.list /target/etc/apt/sources.list.lankeeper.bak 2>/dev/null || true; \
        mkdir -p /target/etc/apt/sources.list.d; \
        rm -f /target/etc/apt/sources.list.d/*.list /target/etc/apt/sources.list.d/*.sources; \
        echo "deb [trusted=yes] file:/tmp/pool-extra ./" > /target/etc/apt/sources.list; \
        in-target /tmp/lankeeper version > /target/tmp/lankeeper-binary-check.log 2>&1 || { \
            code=$?; echo "ERROR: target cannot execute /tmp/lankeeper (exit $code)" >&2; \
            cat /target/tmp/lankeeper-binary-check.log >&2 || true; exit $code; \
        }; \
        in-target /bin/sh /tmp/post-install.sh > /target/tmp/lankeeper-post-install.log 2>&1 || { \
            code=$?; echo "ERROR: post-install failed with exit $code. Last log lines:" >&2; \
            cp /target/tmp/lankeeper-post-install.log /tmp/lankeeper-post-install.log 2>/dev/null || true; \
            tail -n 120 /target/tmp/lankeeper-post-install.log >&2 || true; exit $code; \
        }'

# The "installation complete" confirmation is shown by the
# /usr/lib/finish-install.d/98lankeeper-complete hook installed in
# early_command, so it appears AFTER 92eject and before 99reboot —
# i.e. it is the very last screen the user sees. Showing it from
# late_command would have drawn it underneath d-i's own
# "Finishing the installation" progress bar, with eject/reboot
# steps still pending behind it. d-i's finish-install loop
# POSIX-globs /usr/lib/finish-install.d/* once at loop start, so
# the hook MUST be created during early_command (not late_command)
# for the glob to pick it up.

# Finish
d-i finish-install/reboot_in_progress note
