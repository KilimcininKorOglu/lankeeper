set default=0
set timeout=5

menuentry "Home Router — Automated Install" {
    set background_color=black
    linux __KERNEL_PATH__ priority=high locale?=en_US.UTF-8 keymap?=tr preseed/file=/cdrom/preseed.cfg ---
    initrd __INITRD_PATH__
}

menuentry "Home Router — Expert Install" {
    set background_color=black
    linux __KERNEL_PATH__ priority=low preseed/file=/cdrom/preseed.cfg ---
    initrd __INITRD_PATH__
}

menuentry "Debian 12 — Standard Install" {
    set background_color=black
    linux __KERNEL_PATH__ --- quiet
    initrd __INITRD_PATH__
}
