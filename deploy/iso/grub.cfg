set default=0
set timeout=5

menuentry "Home Router — Automated Install" {
    set background_color=black
    linux /install.amd/vmlinuz auto=true priority=critical preseed/file=/cdrom/preseed.cfg ---
    initrd /install.amd/initrd.gz
}

menuentry "Home Router — Expert Install" {
    set background_color=black
    linux /install.amd/vmlinuz priority=low preseed/file=/cdrom/preseed.cfg ---
    initrd /install.amd/initrd.gz
}

menuentry "Debian 12 — Standard Install" {
    set background_color=black
    linux /install.amd/vmlinuz --- quiet
    initrd /install.amd/initrd.gz
}
