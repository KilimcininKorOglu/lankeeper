{{ define "sidebar" }}
<nav class="sidebar">
    <div class="sidebar-logo">
        <svg viewBox="0 0 24 24" width="32" height="32" fill="var(--accent-blue)">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
        </svg>
    </div>

    <div class="sidebar-nav">
        <a href="/" class="nav-item{{ if eq .Page "dashboard" }} active{{ end }}"
           hx-get="/" hx-target=".content-area" hx-push-url="true">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span class="nav-label">{{ t .Lang "nav.dashboard" }}</span>
        </a>
        <a href="/network" class="nav-item{{ if eq .Page "network" }} active{{ end }}">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
            <span class="nav-label">{{ t .Lang "nav.network" }}</span>
        </a>
        <a href="/firewall" class="nav-item{{ if eq .Page "firewall" }} active{{ end }}">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            <span class="nav-label">{{ t .Lang "nav.firewall" }}</span>
        </a>
        <a href="/vpn" class="nav-item{{ if eq .Page "vpn" }} active{{ end }}">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-2 16l-4-4 1.41-1.41L10 14.17l6.59-6.59L18 9l-8 8z"/></svg>
            <span class="nav-label">{{ t .Lang "nav.vpn" }}</span>
        </a>
        <a href="/dns" class="nav-item{{ if eq .Page "dns" }} active{{ end }}">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            <span class="nav-label">{{ t .Lang "nav.dns" }}</span>
        </a>
        <a href="/qos" class="nav-item{{ if eq .Page "qos" }} active{{ end }}">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.38 8.57l-1.23 1.85a8 8 0 01-.22 7.58H5.07A8 8 0 0115.58 6.85l1.85-1.23A10 10 0 003.35 19a2 2 0 001.72 1h13.85a2 2 0 001.74-1 10 10 0 00-.27-10.44z"/><path d="M10.59 15.41a2 2 0 002.83 0l5.66-8.49-8.49 5.66a2 2 0 000 2.83z"/></svg>
            <span class="nav-label">{{ t .Lang "nav.qos" }}</span>
        </a>
        <a href="/nas" class="nav-item{{ if eq .Page "nas" }} active{{ end }}">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 20h20v-4H2v4zm2-3h2v2H4v-2zM2 4v4h20V4H2zm4 3H4V5h2v2zm-4 7h20v-4H2v4zm2-3h2v2H4v-2z"/></svg>
            <span class="nav-label">{{ t .Lang "nav.nas" }}</span>
        </a>
        <a href="/storage" class="nav-item{{ if eq .Page "storage" }} active{{ end }}">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 2h12a2 2 0 012 2v16a2 2 0 01-2 2H6a2 2 0 01-2-2V4a2 2 0 012-2zm6 2a8 8 0 00-8 8h4a4 4 0 014-4V4zm0 16a8 8 0 008-8h-4a4 4 0 01-4 4v4z"/></svg>
            <span class="nav-label">{{ t .Lang "nav.storage" }}</span>
        </a>
        <a href="/settings" class="nav-item{{ if eq .Page "settings" }} active{{ end }}">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            <span class="nav-label">{{ t .Lang "nav.settings" }}</span>
        </a>
    </div>

    <div class="sidebar-footer">
        <div class="lang-switch">
            <button class="lang-btn{{ if eq .Lang "tr" }} active{{ end }}"
                    hx-post="/settings/lang" hx-vals='{"lang":"tr"}'>TR</button>
            <button class="lang-btn{{ if eq .Lang "en" }} active{{ end }}"
                    hx-post="/settings/lang" hx-vals='{"lang":"en"}'>EN</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()" title="{{ t .Lang "common.toggleTheme" }}">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
        </button>
        <form method="POST" action="/logout">
            <input type="hidden" name="csrf_token" value="{{ .CSRFToken }}">
            <button type="submit" class="nav-item" style="width:100%">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/></svg>
                <span class="nav-label">{{ t .Lang "auth.logout" }}</span>
            </button>
        </form>
    </div>
</nav>
{{ end }}
