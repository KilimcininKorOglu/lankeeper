{{ define "syslog-sources" }}
{{ if .Hosts }}
{{ range .Hosts }}
<div style="padding:var(--space-xs) 0; border-bottom:1px solid var(--border-color);">
    <span style="font-weight:700;">{{ . }}</span>
</div>
{{ end }}
{{ else }}
<div style="color:var(--text-secondary); padding:var(--space-md); text-align:center; font-size:var(--font-sm);">
    {{ t $.Lang "syslog.noRemoteHosts" }}
</div>
{{ end }}
{{ end }}
