{{ define "policy_form" }}
<form hx-post="/routing/policy" hx-swap="none" hx-on::after-request="this.reset();">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--space-md); margin-bottom:var(--space-md);">
        <div class="input-group">
            <label class="input-label">{{ t .Lang "common.name" }}</label>
            <input class="input" name="name" required>
        </div>
        <div class="input-group">
            <label class="input-label">{{ t .Lang "routing.tunnel" }}</label>
            <input class="input" name="tunnel" placeholder="{{ t .Lang "routing.tunnelExample" }}" required>
        </div>
    </div>
    <div class="input-group" style="margin-bottom:var(--space-md);">
        <label class="input-label">{{ t .Lang "routing.sourceMac" }}</label>
        <input class="input" name="srcMacs" placeholder="{{ t .Lang "routing.macExample" }}">
    </div>
    <div class="input-group" style="margin-bottom:var(--space-md);">
        <label class="input-label">{{ t .Lang "routing.sourceIp" }}</label>
        <input class="input" name="srcIps" placeholder="{{ t .Lang "routing.ipExample" }}">
    </div>
    <div class="input-group" style="margin-bottom:var(--space-md);">
        <label class="input-label">{{ t .Lang "routing.destinationCidr" }}</label>
        <input class="input" name="dstIps" placeholder="{{ t .Lang "routing.cidrExample" }}">
    </div>
    <div class="input-group" style="margin-bottom:var(--space-md);">
        <label class="input-label">{{ t .Lang "routing.domains" }}</label>
        <textarea class="input" name="domains" rows="3" placeholder="{{ t .Lang "routing.domainsExample" }}"></textarea>
    </div>
    <button type="submit" class="btn btn-primary btn-sm">{{ t .Lang "common.save" }}</button>
</form>
{{ end }}
