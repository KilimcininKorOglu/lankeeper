{{ define "ntp_status" }}
{{ if .Status }}{{ if .Status.Sources }}
<div class="card">
    <div class="card-header">
        <span class="card-title">{{ t $.Lang "ntp.sources" }}</span>
    </div>
    {{ range .Status.Sources }}
    <div style="display:flex; align-items:center; justify-content:space-between; padding:var(--space-xs) 0; border-bottom:1px solid var(--border-color); font-size:var(--font-sm);">
        <div>
            <span style="font-weight:700; margin-right:var(--space-sm);">{{ .State }}</span>
            <span style="font-family:var(--font-mono);">{{ .Name }}</span>
        </div>
        <div style="color:var(--text-secondary);">
            stratum {{ .Stratum }} | poll {{ .Poll }} | offset {{ .Offset }}
        </div>
    </div>
    {{ end }}
</div>
{{ end }}{{ end }}
{{ end }}
