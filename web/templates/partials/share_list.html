{{ define "share_list" }}
{{ range .Shares }}
<div style="display:flex; align-items:center; justify-content:space-between; padding:var(--space-sm) 0; border-bottom:1px solid var(--border-color);">
    <div>
        <span style="font-weight:700;">{{ .Name }}</span>
        <span style="color:var(--text-secondary); font-size:var(--font-xs); margin-left:var(--space-sm);">{{ .Path }}</span>
    </div>
    <div style="display:flex; align-items:center; gap:var(--space-sm);">
        {{ if .GuestOK }}
            <span class="badge badge-info">{{ t $.Lang "nas.guestAccess" }}</span>
        {{ end }}
        {{ if .ReadOnly }}
            <span class="badge badge-warning">{{ t $.Lang "nas.readOnly" }}</span>
        {{ end }}
        <button class="btn btn-danger btn-sm" hx-delete="/nas/shares/{{ .Name }}" hx-swap="none"
                hx-confirm="{{ t $.Lang "common.confirm" }}">{{ t $.Lang "common.delete" }}</button>
    </div>
</div>
{{ end }}
{{ end }}
